<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Cart</title>
    <!-- CSS Link -->
    <link rel="stylesheet" href="css/style.css">
    <!-- FontAwesome Config -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
        integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

    <header class="navbar">
        <div class="container nav-top">
            <a href="index.html" class="nav-brand">
                <i class="fa-solid fa-basket-shopping brand-logo"></i>
                Cart
            </a>
            <div class="nav-actions">
                <a href="login.html" class="btn btn-outline" style="padding: 8px 20px; border-radius: var(--radius-full);">Log In</a>
            </div>
        </div>
    </header>

    <main class="auth-main">
        <div class="container" style="display: flex; justify-content: center;">
            <div class="auth-card" style="max-width: 450px; width: 100%;">
                <div class="auth-header">
                    <h2>Reset Password</h2>
                    <p>Enter your email to receive a password reset link.</p>
                </div>
                
                <div class="alert-box" id="forgot-alert" style="display: none;"></div>

                <form id="forgot-password-form" class="auth-form" onsubmit="event.preventDefault();">
                    <div class="input-group">
                        <label for="forgot-email">Email Address</label>
                        <div class="input-wrapper">
                            <i class="fa-regular fa-envelope input-icon"></i>
                            <input type="email" id="forgot-email" placeholder="Enter your email" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary auth-btn w-100" id="reset-btn">
                        Send Reset Link
                    </button>
                </form>

                <div class="auth-footer" style="text-align: center; margin-top: 20px;">
                    <p><a href="login.html"><i class="fa-solid fa-arrow-left"></i> Back to Login</a></p>
                </div>
            </div>
        </div>
    </main>

    <script src="js/auth.js"></script>
</body>
</html>
